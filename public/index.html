<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omegle Lite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Omegle Lite</h1>
    </header>

    <div id="status-bar">
      <span id="status">Desconectado</span>
    </div>

    <div id="video-container">
      <div class="video-wrapper">
        <video id="remoteVideo" autoplay playsinline></video>
        <span class="label">Extraño</span>
      </div>
      <div class="video-wrapper local">
        <video id="localVideo" autoplay playsinline muted></video>
        <span class="label">Tú</span>
      </div>
    </div>

    <div id="chat-container">
      <div id="messages"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Escribe un mensaje..." autocomplete="off" disabled />
        <button type="submit" id="send-btn" disabled>Enviar</button>
      </form>
    </div>

    <div id="controls">
      <button id="next-btn">Siguiente</button>
      <button id="stop-btn" disabled>Detener</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
